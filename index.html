<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Trading Platform Clone</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }header {
  background: #020617;
  padding: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}

.controls button {
  margin-right: 5px;
  padding: 6px 10px;
  background: #1e293b;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 4px;
}

.controls button:hover {
  background: #334155;
}

#chart {
  flex: 1;
}

.toolbar {
  position: absolute;
  top: 70px;
  left: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.tool-btn {
  padding: 8px;
  background: #1e293b;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 4px;
  width: 45px;
}

.tool-btn:hover {
  background: #334155;
}

.replay-controls {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  background: #020617;
  padding: 10px;
  border-radius: 6px;
}

.replay-controls button {
  padding: 6px 10px;
  background: #1e293b;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 4px;
}

  </style>
</head>
<body><header>
  <div>Advanced Trading Platform</div>  <div class="controls">
    <button onclick="setSymbol('BTCUSDT')">BTC</button>
    <button onclick="setSymbol('ETHUSDT')">ETH</button>
  </div>  <div class="controls">
    <button onclick="setTimeframe('1m')">1m</button>
    <button onclick="setTimeframe('5m')">5m</button>
    <button onclick="setTimeframe('15m')">15m</button>
    <button onclick="setTimeframe('1h')">1H</button>
  </div>  <div class="controls">
    <button onclick="startReplay()">Replay</button>
    <button onclick="playReplay()">Play</button>
    <button onclick="pauseReplay()">Pause</button>
    <button onclick="stepReplay()">Step</button>
  </div>
</header><div id="chart"></div><div class="toolbar">
  <button class="tool-btn" onclick="enableCrosshair()">+</button>
</div><div class="replay-controls">
  <button onclick="stepReplay()">Step</button>
  <button onclick="playReplay()">Play</button>
  <button onclick="pauseReplay()">Pause</button>
</div><script>
  const chartContainer = document.getElementById('chart');

  const chart = LightweightCharts.createChart(chartContainer, {
    layout: {
      background: { color: '#0f172a' },
      textColor: '#DDD'
    },
    grid: {
      vertLines: { color: '#1e293b' },
      horzLines: { color: '#1e293b' }
    },
    width: window.innerWidth,
    height: window.innerHeight - 120
  });

  const candleSeries = chart.addCandlestickSeries();

  let currentSymbol = 'BTCUSDT';
  let currentTimeframe = '1m';
  let historicalData = [];
  let replayIndex = 0;
  let replayInterval = null;
  let isReplayMode = false;

  async function fetchHistorical(symbol, interval) {
    const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=200`);
    const raw = await res.json();

    return raw.map(c => ({
      time: Math.floor(c[0] / 1000),
      open: parseFloat(c[1]),
      high: parseFloat(c[2]),
      low: parseFloat(c[3]),
      close: parseFloat(c[4])
    }));
  }

  async function loadChart() {
    historicalData = await fetchHistorical(currentSymbol, currentTimeframe);
    replayIndex = 0;

    if (!isReplayMode) {
      candleSeries.setData(historicalData);
    }
  }

  function startReplay() {
    isReplayMode = true;
    replayIndex = 0;
    candleSeries.setData([]);
    if (replayInterval) clearInterval(replayInterval);
  }

  function playReplay() {
    if (!isReplayMode) startReplay();

    if (replayInterval) return;

    replayInterval = setInterval(() => {
      if (replayIndex >= historicalData.length) {
        clearInterval(replayInterval);
        replayInterval = null;
        return;
      }

      const candle = historicalData[replayIndex];
      candleSeries.update(candle);
      replayIndex++;
    }, 500);
  }

  function pauseReplay() {
    if (replayInterval) {
      clearInterval(replayInterval);
      replayInterval = null;
    }
  }

  function stepReplay() {
    if (!isReplayMode) startReplay();

    if (replayIndex < historicalData.length) {
      candleSeries.update(historicalData[replayIndex]);
      replayIndex++;
    }
  }

  function setSymbol(symbol) {
    currentSymbol = symbol;
    isReplayMode = false;
    loadChart();
  }

  function setTimeframe(tf) {
    currentTimeframe = tf;
    isReplayMode = false;
    loadChart();
  }

  function enableCrosshair() {
    chart.applyOptions({ crosshair: { mode: 1 } });
  }

  loadChart();

  window.addEventListener('resize', () => {
    chart.applyOptions({
      width: window.innerWidth,
      height: window.innerHeight - 120
    });
  });
</script></body>
</html>
