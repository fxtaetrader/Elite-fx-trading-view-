<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TradingView · Fullscreen</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0b1017; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Simple minimal header */
        .header {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f1a24;
            border-bottom: 1px solid #2a3f54;
        }
        
        .logo { 
            font-size: 1.2rem; 
            font-weight: 600; 
            color: #ffb347;
        }
        
        .pair-selector {
            display: flex;
            gap: 10px;
        }
        
        .pair-btn {
            background: #16222e;
            border: 1px solid #3a5670;
            border-radius: 30px;
            padding: 6px 16px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .pair-btn.active {
            background: #1f364d;
            border-color: #ffb347;
            color: #ffd966;
        }
        
        /* Fullscreen chart container */
        .chart-container {
            flex: 1;
            width: 100%;
            background: #0f1a24;
            overflow: hidden;
            position: relative;
        }
        
        #tv_chart {
            width: 100%;
            height: 100%;
        }
        
        /* Icon-only button group - positioned near top right, minimal space */
        .icon-toolbar {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 100;
            display: flex;
            gap: 8px;
            background: rgba(21, 34, 46, 0.85);
            backdrop-filter: blur(10px);
            padding: 6px 10px;
            border-radius: 40px;
            border: 1px solid #3a5670;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        /* Individual icon buttons */
        .icon-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: #b9c7d9;
            font-size: 18px;
            width: 32px;
            height: 32px;
            position: relative;
        }
        
        .icon-btn:hover {
            background: #2a3f54;
            color: #ffd966;
            transform: scale(1.05);
        }
        
        /* Active state for replay button */
        .icon-btn.replay-active {
            background: #ffb34720;
            color: #ffb347;
            box-shadow: 0 0 0 1px #ffb347;
        }
        
        /* Indicator button subtle indicator */
        .icon-btn.indicator-active {
            background: #2a6b9e30;
            color: #6bb5ff;
        }
        
        /* Tooltip on hover - shows icon name without taking space */
        .icon-btn::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: -32px;
            right: 0;
            background: #1e2a36;
            color: #ffd966;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            border: 1px solid #3a5670;
            font-weight: 500;
            z-index: 101;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .icon-btn:hover::after {
            opacity: 1;
        }
        
        /* Replay active animation dot (optional subtle) */
        .replay-pulse-dot {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 8px;
            height: 8px;
            background-color: #ffb347;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        
        /* Responsive adjustments */
        @media (max-width: 640px) {
            .icon-toolbar {
                top: 8px;
                right: 8px;
                padding: 4px 8px;
                gap: 4px;
            }
            .icon-btn {
                width: 28px;
                height: 28px;
                font-size: 14px;
            }
            .icon-btn::after {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Minimal header -->
    <div class="header">
        <div class="logo">📊 TV CHARTS</div>
        <div class="pair-selector">
            <div class="pair-btn active" id="btn-xau" onclick="switchPair('XAUUSD')">XAUUSD</div>
            <div class="pair-btn" id="btn-btc" onclick="switchPair('BTCUSD')">BTCUSD</div>
        </div>
    </div>
    
    <!-- Fullscreen TradingView Chart -->
    <div class="chart-container">
        <div id="tv_chart"></div>
        
        <!-- Icon-only toolbar (Indicators + Replay) - no text, just icons to maximize space -->
        <div class="icon-toolbar">
            <!-- Indicators Icon (opens TradingView indicators menu) -->
            <button id="indicatorsIcon" class="icon-btn" data-tooltip="Indicators" onclick="openIndicators()">
                📈
            </button>
            <!-- Replay Icon -->
            <button id="replayIcon" class="icon-btn" data-tooltip="Replay Mode" onclick="toggleReplayMode()">
                ⏪
            </button>
        </div>
    </div>

    <!-- TradingView Widget Script -->
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let currentPair = 'XAUUSD';
        let tvWidget = null;
        let replayActive = false;
        let replayInterval = null;
        
        // ==================== INDICATOR FUNCTION ====================
        // Opens the TradingView indicators dialog (native widget method)
        window.openIndicators = function() {
            if (tvWidget && tvWidget._api) {
                try {
                    // Method 1: Use the chart's built-in action to show indicators menu
                    const chart = tvWidget._api;
                    if (chart && chart.showIndicatorsDialog) {
                        chart.showIndicatorsDialog();
                    } else if (chart && chart.executeActionById) {
                        // Alternative: use action ID to open indicators
                        chart.executeActionById("indicatorsDialog");
                    } else {
                        // Fallback: try to access through widget's internal chart
                        if (tvWidget.chart) {
                            tvWidget.chart().executeActionById("indicatorsDialog");
                        }
                    }
                } catch(e) {
                    console.warn("Could not open indicators dialog", e);
                }
            }
            // Visual feedback: subtle highlight
            const indicatorsBtn = document.getElementById('indicatorsIcon');
            if (indicatorsBtn) {
                indicatorsBtn.classList.add('indicator-active');
                setTimeout(() => {
                    indicatorsBtn.classList.remove('indicator-active');
                }, 300);
            }
        };
        
        // ==================== REPLAY MODE FUNCTIONALITY ====================
        // Stop replay and clean up
        function stopReplayMode() {
            if (replayInterval) {
                clearInterval(replayInterval);
                replayInterval = null;
            }
            replayActive = false;
            
            // Update replay icon UI (remove active state and pulse dot)
            const replayBtn = document.getElementById('replayIcon');
            if (replayBtn) {
                replayBtn.classList.remove('replay-active');
                // Remove existing pulse dot if any
                const existingDot = replayBtn.querySelector('.replay-pulse-dot');
                if (existingDot) existingDot.remove();
            }
        }
        
        // Helper to get chart API safely
        function getChartAPI() {
            if (tvWidget && tvWidget._api) {
                return tvWidget._api;
            }
            if (tvWidget && tvWidget.chart) {
                return tvWidget.chart();
            }
            return null;
        }
        
        // Start replay mode - steps through historical bars automatically
        function startReplayMode() {
            if (replayActive) return;
            
            try {
                const chart = getChartAPI();
                if (!chart) {
                    console.warn("Chart API not ready, retrying...");
                    setTimeout(startReplayMode, 500);
                    return;
                }
                
                replayActive = true;
                
                // Update replay icon UI (active state with pulse dot)
                const replayBtn = document.getElementById('replayIcon');
                if (replayBtn) {
                    replayBtn.classList.add('replay-active');
                    // Add animated pulse dot to indicate active replay
                    const pulseDot = document.createElement('span');
                    pulseDot.className = 'replay-pulse-dot';
                    replayBtn.appendChild(pulseDot);
                }
                
                // Use TradingView's timeScale step right functionality
                // Two approaches: use executeActionById or manually shift logical range
                const timeScale = chart.timeScale();
                
                if (timeScale && typeof timeScale.getVisibleLogicalRange === 'function') {
                    // Get current logical range and start stepping forward bar by bar
                    let stepping = true;
                    
                    const stepForward = () => {
                        if (!replayActive) {
                            stepping = false;
                            return;
                        }
                        try {
                            const currentRange = timeScale.getVisibleLogicalRange();
                            if (currentRange) {
                                const newFrom = currentRange.from + 1;
                                const newTo = currentRange.to + 1;
                                // Prevent stepping too far (if we exceed available bars, stop gracefully)
                                // TradingView will handle bounds naturally, but we check if it's still valid
                                timeScale.setVisibleLogicalRange({ from: newFrom, to: newTo });
                            } else {
                                // Fallback to action
                                if (chart.executeActionById) {
                                    chart.executeActionById("timeScaleStepRight");
                                }
                            }
                        } catch(e) {
                            // If error occurs, try fallback action
                            if (chart.executeActionById) {
                                chart.executeActionById("timeScaleStepRight");
                            }
                        }
                    };
                    
                    // Clear any existing interval
                    if (replayInterval) clearInterval(replayInterval);
                    // Step every 1.2 seconds for smooth bar replay
                    replayInterval = setInterval(stepForward, 1200);
                    
                    // First step after short delay
                    setTimeout(() => {
                        if (replayActive) stepForward();
                    }, 400);
                    
                } else if (chart.executeActionById) {
                    // Fallback: use TradingView's built-in action for stepping right
                    if (replayInterval) clearInterval(replayInterval);
                    replayInterval = setInterval(() => {
                        if (replayActive && chart.executeActionById) {
                            chart.executeActionById("timeScaleStepRight");
                        }
                    }, 1200);
                } else {
                    // If all fails, deactivate replay
                    console.warn("Replay not supported on this chart instance");
                    stopReplayMode();
                }
                
            } catch (error) {
                console.error("Error starting replay mode:", error);
                replayActive = false;
                const replayBtn = document.getElementById('replayIcon');
                if (replayBtn) replayBtn.classList.remove('replay-active');
            }
        }
        
        // Toggle replay mode
        window.toggleReplayMode = function() {
            if (replayActive) {
                stopReplayMode();
            } else {
                // Ensure any previous interval is cleared
                if (replayInterval) {
                    clearInterval(replayInterval);
                    replayInterval = null;
                }
                startReplayMode();
            }
        };
        
        // Cleanup replay when switching pairs or destroying widget
        function stopReplayAndCleanup() {
            if (replayInterval) {
                clearInterval(replayInterval);
                replayInterval = null;
            }
            replayActive = false;
            const replayBtn = document.getElementById('replayIcon');
            if (replayBtn) {
                replayBtn.classList.remove('replay-active');
                const existingDot = replayBtn.querySelector('.replay-pulse-dot');
                if (existingDot) existingDot.remove();
            }
        }
        
        // ==================== TRADINGVIEW WIDGET INIT ====================
        function initTradingViewWidget(symbol) {
            // Stop replay before reinitializing
            stopReplayAndCleanup();
            
            // Map symbols to TradingView format
            const tvSymbol = symbol === 'XAUUSD' ? 'FX_IDC:XAUUSD' : 'COINBASE:BTCUSD';
            
            // Destroy existing widget if any
            if (tvWidget && typeof tvWidget.remove === 'function') {
                try {
                    tvWidget.remove();
                } catch(e) {}
                tvWidget = null;
            }
            
            // Create fresh TradingView widget with full height and indicator support
            tvWidget = new TradingView.widget({
                "width": "100%",
                "height": "100%",
                "symbol": tvSymbol,
                "interval": "15",
                "timezone": "exchange",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#0f1a24",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "container_id": "tv_chart",
                // Include a basic moving average study as default (indicator)
                "studies": [
                    "MASimple@tv-basicstudies"
                ],
                "disabled_features": ["use_localstorage_for_settings"],
                "enabled_features": ["show_hide_button_on_legend"],
                "loading_screen": { "backgroundColor": "#0f1a24" }
            });
            
            // When chart is ready, ensure we can access indicators properly
            tvWidget.onChartReady(() => {
                // Chart is ready, indicator functionality will be available
                // Small UI polish: ensure no replay state remains
                stopReplayAndCleanup();
            });
        }
        
        // Switch between XAUUSD and BTCUSD
        window.switchPair = function(pair) {
            if (currentPair === pair) return;
            currentPair = pair;
            
            // Update button active states
            document.getElementById('btn-xau').classList.remove('active');
            document.getElementById('btn-btc').classList.remove('active');
            document.getElementById(pair === 'XAUUSD' ? 'btn-xau' : 'btn-btc').classList.add('active');
            
            // Stop replay mode gracefully
            stopReplayAndCleanup();
            
            // Reinitialize chart with new symbol
            initTradingViewWidget(pair);
        };
        
        // ==================== ADDITIONAL UTILITIES ====================
        // Helper to resize widget on window resize
        window.addEventListener('resize', function() {
            if (tvWidget && tvWidget.resize) {
                try {
                    tvWidget.resize();
                } catch(e) {}
            }
        });
        
        // Clean up on page unload
        window.addEventListener('beforeunload', function() {
            if (replayInterval) {
                clearInterval(replayInterval);
            }
            if (tvWidget && typeof tvWidget.remove === 'function') {
                try {
                    tvWidget.remove();
                } catch(e) {}
            }
        });
        
        // Initialize on page load
        window.onload = function() {
            initTradingViewWidget('XAUUSD');
        };
        
        // Optional: If user clicks on chart or interacts, replay continues normally (no conflict)
        // The icons are purely additive and don't interfere with TradingView's native UI.
        // All original features: pair selector, fullscreen chart, moving average study remain.
        
        // Also ensure indicator button works even after chart reload
        // The openIndicators function uses widget API which persists across symbol changes
    </script>
</body>
</html>
