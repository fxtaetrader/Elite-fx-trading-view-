<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Trading Platform Clone</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }header {
  background: #020617;
  padding: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}

.controls button {
  margin-right: 5px;
  padding: 6px 10px;
  background: #1e293b;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 4px;
}

.controls button:hover {
  background: #334155;
}

#chart {
  flex: 1;
}

.toolbar {
  position: absolute;
  top: 70px;
  left: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.tool-btn {
  padding: 8px;
  background: #1e293b;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 4px;
  width: 45px;
}

.tool-btn:hover {
  background: #334155;
}

  </style>
</head>
<body><header>
  <div>Advanced Trading Platform</div>  <div class="controls">
    <button onclick="setSymbol('BTCUSDT')">BTC</button>
    <button onclick="setSymbol('ETHUSDT')">ETH</button>
    <button onclick="setSymbol('AAPL')">AAPL</button>
  </div>  <div class="controls">
    <button onclick="setTimeframe('1')">1m</button>
    <button onclick="setTimeframe('5')">5m</button>
    <button onclick="setTimeframe('15')">15m</button>
    <button onclick="setTimeframe('60')">1H</button>
  </div>
</header><div id="chart"></div><div class="toolbar">
  <button class="tool-btn" onclick="enableCrosshair()">+</button>
  <button class="tool-btn" onclick="startTrendline()">/</button>
</div><script>
  const chartContainer = document.getElementById('chart');

  const chart = LightweightCharts.createChart(chartContainer, {
    layout: {
      background: { color: '#0f172a' },
      textColor: '#DDD'
    },
    grid: {
      vertLines: { color: '#1e293b' },
      horzLines: { color: '#1e293b' }
    },
    width: window.innerWidth,
    height: window.innerHeight - 80
  });

  const candleSeries = chart.addCandlestickSeries();
  const emaSeries = chart.addLineSeries();

  let currentSymbol = 'BTCUSDT';
  let currentTimeframe = '1';

  function generateMockData() {
    let data = [];
    let base = 100;

    for (let i = 0; i < 50; i++) {
      let open = base + Math.random() * 10;
      let close = open + (Math.random() - 0.5) * 10;
      let high = Math.max(open, close) + Math.random() * 5;
      let low = Math.min(open, close) - Math.random() * 5;

      data.push({
        time: Math.floor(Date.now() / 1000) - (50 - i) * 60,
        open,
        high,
        low,
        close
      });

      base = close;
    }

    return data;
  }

  function calculateEMA(data, period = 10) {
    let k = 2 / (period + 1);
    let emaArray = [];
    let ema = data[0].close;

    for (let i = 0; i < data.length; i++) {
      ema = data[i].close * k + ema * (1 - k);
      emaArray.push({ time: data[i].time, value: ema });
    }

    return emaArray;
  }

  function loadChart() {
    const data = generateMockData();
    candleSeries.setData(data);

    const emaData = calculateEMA(data);
    emaSeries.setData(emaData);
  }

  function setSymbol(symbol) {
    currentSymbol = symbol;
    loadChart();
  }

  function setTimeframe(tf) {
    currentTimeframe = tf;
    loadChart();
  }

  function enableCrosshair() {
    chart.applyOptions({
      crosshair: { mode: 1 }
    });
  }

  let drawing = false;
  let trendlinePoints = [];
  let trendlineSeries = null;

  function startTrendline() {
    drawing = true;
    trendlinePoints = [];
    alert('Click two points on chart to draw a trendline');
  }

  chart.subscribeClick(param => {
    if (!drawing || !param.time || !param.point) return;

    trendlinePoints.push({ time: param.time, value: param.seriesPrices.get(candleSeries) });

    if (trendlinePoints.length === 2) {
      drawing = false;

      if (trendlineSeries) {
        chart.removeSeries(trendlineSeries);
      }

      trendlineSeries = chart.addLineSeries();
      trendlineSeries.setData([
        trendlinePoints[0],
        trendlinePoints[1]
      ]);
    }
  });

  loadChart();

  window.addEventListener('resize', () => {
    chart.applyOptions({
      width: window.innerWidth,
      height: window.innerHeight - 80
    });
  });
</script></body>
</html>
