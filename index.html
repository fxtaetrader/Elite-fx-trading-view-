<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TradingView · Fullscreen · Extended</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #0b1017; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* header – exactly as before, but now with profile icon button */
        .header {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f1a24;
            border-bottom: 1px solid #2a3f54;
        }

        .logo { font-size: 1.2rem; font-weight: 600; color: #ffb347; letter-spacing: 0.5px; }

        .pair-selector { display: flex; gap: 10px; }

        .pair-btn {
            background: #16222e;
            border: 1px solid #3a5670;
            border-radius: 30px;
            padding: 6px 16px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
        }
        .pair-btn.active {
            background: #1f364d;
            border-color: #ffb347;
            color: #ffd966;
        }

        /* profile icon button (right side of header) */
        .profile-area { display: flex; align-items: center; }
        .profile-btn {
            background: #1e2c3a;
            border: 1px solid #3f5568;
            border-radius: 40px;
            padding: 6px 14px 6px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #e0e7ef;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.95rem;
        }
        .profile-btn:hover { background: #263b4d; border-color: #ffb347; }
        .profile-icon { font-size: 1.4rem; line-height: 1; }
        .profile-arrow { font-size: 0.9rem; opacity: 0.8; }

        /* top axis bar – new row below header (replay, settings, fullscreen) */
        .top-axis-bar {
            background: #0f1a24;
            padding: 6px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid #1e3347;
            color: #bdd0e6;
            font-size: 0.9rem;
            flex-wrap: wrap;
        }
        .axis-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .axis-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #17212b;
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid #2e4560;
            cursor: pointer;
            transition: 0.15s;
        }
        .axis-item:hover { background: #1f3243; border-color: #ffb347; }
        .separator { width: 1px; height: 22px; background: #2a4055; margin: 0 6px; }

        /* chart container takes remaining space */
        .chart-container {
            flex: 1;
            width: 100%;
            background: #0f1a24;
            overflow: hidden;
            position: relative;
        }
        #tv_chart {
            width: 100%;
            height: 100%;
        }

        /* hidden modal for double‑tap settings (candle appearance) */
        .settings-modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #1e2b38;
            border: 2px solid #3f5e7c;
            border-radius: 28px;
            padding: 28px 32px;
            color: white;
            width: 340px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            z-index: 2000;
            display: none;
            flex-direction: column;
            gap: 20px;
        }
        .settings-modal.show { display: flex; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { color: #ffb347; font-weight: 500; letter-spacing: 0.5px; }
        .close-modal {
            background: none; border: none; color: #ccc; font-size: 1.8rem; cursor: pointer; line-height: 1;
        }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #38536b;
            padding: 12px 0;
        }
        .setting-label { color: #cbdae9; }
        .setting-value {
            background: #0b1823;
            padding: 4px 14px;
            border-radius: 40px;
            border: 1px solid #3f627c;
            color: #ffdb9d;
            cursor: pointer;
        }
        .color-dot {
            display: inline-block;
            width: 20px; height: 20px;
            border-radius: 4px;
            margin-left: 10px;
            vertical-align: middle;
            border: 1px solid white;
        }
        .up-badge { background: #4caf50; }
        .down-badge { background: #f44336; }
        .bg-badge { background: #0f1a24; }

        /* overlay for modal */
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5);
            z-index: 1999;
            display: none;
        }
        .modal-overlay.show { display: block; }

        /* left toolbar additions (magnet, delete) are injected via widget settings,
           but we also add floating helper for extra tools (TradingView left toolbar includes them) */
        /* we keep original widget left toolbar visible */
    </style>
</head>
<body>
    <!-- Minimal header with profile icon button (upper axis right side) -->
    <div class="header">
        <div class="logo">📊 TV CHARTS · PRO</div>
        <div style="display: flex; gap: 20px; align-items: center;">
            <div class="pair-selector">
                <div class="pair-btn active" id="btn-xau" onclick="switchPair('XAUUSD')">XAUUSD</div>
                <div class="pair-btn" id="btn-btc" onclick="switchPair('BTCUSD')">BTCUSD</div>
            </div>
            <!-- profile button (upper axis right) -->
            <div class="profile-area">
                <div class="profile-btn" id="profileSettingsBtn">
                    <span class="profile-icon">👤</span>
                    <span class="profile-arrow">▼</span>
                </div>
            </div>
        </div>
    </div>

    <!-- New top axis bar: replay, chart settings, fullscreen (and extra items) -->
    <div class="top-axis-bar">
        <div class="axis-group">
            <div class="axis-item" id="replayButton">
                <span>⏯️</span><span>Replay</span>
            </div>
            <div class="axis-item" id="chartSettingsButton">
                <span>⚙️</span><span>Chart settings</span>
            </div>
            <div class="axis-item" id="fullscreenButton">
                <span>⛶</span><span>Fullscreen</span>
            </div>
        </div>
        <!-- extra axis info: can be left empty but we keep it minimal -->
        <div style="flex:1"></div>
        <!-- optional indicator that magnet/drawings are on left toolbar (already there) -->
        <div style="color:#5b7994; font-size:0.8rem">left toolbar: magnet / delete drawing</div>
    </div>

    <!-- Fullscreen TradingView Chart Container -->
    <div class="chart-container" id="chartContainer">
        <div id="tv_chart"></div>
    </div>

    <!-- Double‑tap settings modal (candle appearance, background etc) -->
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="settings-modal" id="candleSettingsModal">
        <div class="modal-header">
            <h3>📈  Candle appearance</h3>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <div class="setting-row">
            <span class="setting-label">Candle up color</span>
            <span class="setting-value">green <span class="color-dot up-badge"></span></span>
        </div>
        <div class="setting-row">
            <span class="setting-label">Candle down color</span>
            <span class="setting-value">red <span class="color-dot down-badge"></span></span>
        </div>
        <div class="setting-row">
            <span class="setting-label">Background</span>
            <span class="setting-value">dark <span class="color-dot bg-badge"></span></span>
        </div>
        <div class="setting-row">
            <span class="setting-label">Grid lines</span>
            <span class="setting-value">#2a3f58</span>
        </div>
        <div class="setting-row">
            <span class="setting-label">Body border</span>
            <span class="setting-value">on</span>
        </div>
        <div style="color:#9bb8da; font-size:0.9rem; text-align:center; margin-top:8px;">(demo settings – TradingView style)</div>
    </div>

    <!-- TradingView Widget Script -->
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        (function() {
            let currentPair = 'XAUUSD';
            let tvWidget = null;

            // ---------- helper: init widget with left toolbar extras (magnet & delete drawing are part of drawings toolbar) ----------
            function initTradingViewWidget(symbol) {
                const container = document.getElementById('tv_chart');
                // clear previous widget if any
                if (tvWidget && typeof tvWidget.remove === 'function') {
                    tvWidget.remove();
                }

                const tvSymbol = symbol === 'XAUUSD' ? 'FX_IDC:XAUUSD' : 'COINBASE:BTCUSD';

                // TradingView widget config
                tvWidget = new TradingView.widget({
                    "width": "100%",
                    "height": "100%",
                    "symbol": tvSymbol,
                    "interval": "15",
                    "timezone": "exchange",
                    "theme": "dark",
                    "style": "1",          // candlestick style
                    "locale": "en",
                    "toolbar_bg": "#0f1a24",
                    "enable_publishing": false,
                    "hide_side_toolbar": false,      // left toolbar visible (includes drawings, magnet, delete etc)
                    "allow_symbol_change": true,
                    "container_id": "tv_chart",
                    "studies": [ "MASimple@tv-basicstudies" ],
                    "disabled_features": ["use_localstorage_for_settings"],
                    "enabled_features": ["show_hide_button_on_legend"],
                    // explicitly include magnet (snap to data) and delete drawing tool
                    "drawings": {
                        "toolbar": {
                            "undo": true,
                            "redo": true,
                            "snap": true,               // magnet
                            "delete": true,              // delete drawing
                            "flip": true,
                            "filled": true,
                            "styles": true
                        }
                    }
                });

                // after widget ready, we can also ensure left toolbar has those tools (they are default)
                return tvWidget;
            }

            // switch pair
            window.switchPair = function(pair) {
                currentPair = pair;
                document.getElementById('btn-xau').classList.remove('active');
                document.getElementById('btn-btc').classList.remove('active');
                document.getElementById(pair === 'XAUUSD' ? 'btn-xau' : 'btn-btc').classList.add('active');

                initTradingViewWidget(pair);
            };

            // ----- profile settings click (upper axis button) -----
            document.getElementById('profileSettingsBtn').addEventListener('click', function() {
                alert('👤 Profile settings – trading preferences, notifications, API keys.\n( demo action )');
            });

            // ----- replay button action (top axis) -----
            document.getElementById('replayButton').addEventListener('click', function() {
                alert('⏯️ Replay mode: bar replay (simulated).\nDrag timeline to replay market movement.');
            });

            // ----- chart settings button (top axis) – triggers the same modal as double-tap? but we link to modal for consistency -----
            document.getElementById('chartSettingsButton').addEventListener('click', function() {
                showSettingsModal();
            });

            // ----- fullscreen button (top axis) toggle -----
            document.getElementById('fullscreenButton').addEventListener('click', function() {
                const container = document.getElementById('chartContainer');
                if (!document.fullscreenElement) {
                    container.requestFullscreen().catch(err => alert('Fullscreen not supported'));
                } else {
                    document.exitFullscreen();
                }
            });

            // ----- double‑tap on chart to open settings (candle appearance) -----
            const chartDiv = document.getElementById('tv_chart');
            let lastTap = 0;
            chartDiv.addEventListener('touchstart', function(e) {
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTap;
                if (tapLength < 300 && tapLength > 0) {
                    // double tap detected
                    e.preventDefault();
                    showSettingsModal();
                }
                lastTap = currentTime;
            });

            // also double-click for mouse users
            chartDiv.addEventListener('dblclick', function(e) {
                e.preventDefault();
                showSettingsModal();
            });

            // settings modal functions
            const modal = document.getElementById('candleSettingsModal');
            const overlay = document.getElementById('modalOverlay');
            function showSettingsModal() {
                modal.classList.add('show');
                overlay.classList.add('show');
            }
            function hideSettingsModal() {
                modal.classList.remove('show');
                overlay.classList.remove('show');
            }

            document.getElementById('closeModalBtn').addEventListener('click', hideSettingsModal);
            overlay.addEventListener('click', hideSettingsModal);

            // also setting rows can be "clickable" to simulate color change
            document.querySelectorAll('.setting-value').forEach(el => {
                el.addEventListener('click', function() {
                    alert('TradingView style: color picker would open.\n(demo)');
                });
            });

            // ---------- initialize ----------
            window.onload = function() {
                initTradingViewWidget('XAUUSD');
            };

            // resize handling
            window.addEventListener('resize', function() {
                if (tvWidget && tvWidget.resize) {
                    tvWidget.resize();
                }
            });

            // optional: ensure magnet & delete are present (already enabled via drawings toolbar)
        })();
    </script>

    <!-- tiny style: left toolbar (TradingView native) will show magnet icon as "snap" when drawing tool active. we also added delete. 
         also simulate that left toolbar contains them. -->
</body>
    </html>
