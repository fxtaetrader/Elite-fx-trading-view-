<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TradingView · Fullscreen</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0b1017; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Simple minimal header */
        .header {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f1a24;
            border-bottom: 1px solid #2a3f54;
            flex-shrink: 0;
        }
        
        .logo { 
            font-size: 1.2rem; 
            font-weight: 600; 
            color: #ffb347;
        }
        
        .pair-selector {
            display: flex;
            gap: 10px;
        }
        
        .pair-btn {
            background: #16222e;
            border: 1px solid #3a5670;
            border-radius: 30px;
            padding: 6px 16px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .pair-btn.active {
            background: #1f364d;
            border-color: #ffb347;
            color: #ffd966;
        }
        
        /* Fullscreen chart container */
        .chart-container {
            flex: 1;
            width: 100%;
            background: #0f1a24;
            overflow: hidden;
            position: relative;
        }
        
        #tv_chart {
            width: 100%;
            height: 100%;
        }
        
        /* Custom replay button - icon only, positioned near top right corner */
        .replay-control {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 100;
            background: rgba(21, 34, 46, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #3a5670;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .replay-control:hover {
            background: #1f364d;
            border-color: #ffb347;
            transform: scale(1.05);
        }
        
        .replay-icon {
            font-size: 18px;
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.3));
        }
        
        .replay-control.active {
            background: #2a4a6e;
            border-color: #ffb347;
            box-shadow: 0 0 6px rgba(255,180,71,0.3);
        }
        
        /* Simple replay status indicator (pulsing dot when active) */
        .replay-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 10px;
            height: 10px;
            background-color: #ffb347;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
            border: 1px solid #0f1a24;
        }
        
        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        
        /* Tooltip on hover for clarity */
        .replay-control::before {
            content: "Replay Mode";
            position: absolute;
            bottom: -32px;
            right: 0;
            background: #1e2a36;
            color: #ffd966;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            border: 1px solid #3a5670;
            font-weight: normal;
            z-index: 101;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .replay-control:hover::before {
            opacity: 1;
        }
        
        /* Responsive adjustments */
        @media (max-width: 640px) {
            .replay-control {
                top: 8px;
                right: 8px;
                width: 32px;
                height: 32px;
            }
            .replay-icon {
                font-size: 16px;
            }
            .replay-control::before {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Minimal header -->
    <div class="header">
        <div class="logo">📊 TV CHARTS</div>
        <div class="pair-selector">
            <div class="pair-btn active" id="btn-xau" onclick="switchPair('XAUUSD')">XAUUSD</div>
            <div class="pair-btn" id="btn-btc" onclick="switchPair('BTCUSD')">BTCUSD</div>
        </div>
    </div>
    
    <!-- Fullscreen TradingView Chart -->
    <div class="chart-container">
        <div id="tv_chart"></div>
        
        <!-- Custom Replay Mode Icon - ICON ONLY, no text -->
        <div id="replayButton" class="replay-control" onclick="toggleReplayMode()">
            <span class="replay-icon">⏪</span>
            <span id="replayActiveDot" style="display: none;" class="replay-badge"></span>
        </div>
    </div>

    <!-- TradingView Widget Script -->
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let currentPair = 'XAUUSD';
        let tvWidget = null;
        let replayActive = false;
        let replayInterval = null;
        
        // Helper to get the chart instance from widget
        function getChart() {
            if (tvWidget && tvWidget._api) {
                return tvWidget._api;
            }
            return null;
        }
        
        // Start replay mode - moves chart bars forward automatically
        function startReplayMode() {
            if (replayActive) return;
            
            try {
                const chart = getChart();
                if (!chart) {
                    console.warn("Chart API not ready yet, retrying...");
                    setTimeout(startReplayMode, 500);
                    return;
                }
                
                replayActive = true;
                
                // Update UI - show active dot
                const replayBtn = document.getElementById('replayButton');
                const activeDot = document.getElementById('replayActiveDot');
                
                if (replayBtn) replayBtn.classList.add('active');
                if (activeDot) activeDot.style.display = 'block';
                
                // Clear any existing interval
                if (replayInterval) clearInterval(replayInterval);
                
                // Use chart's timeScale to step forward one bar at a time
                const timeScale = chart.timeScale();
                
                // Get current visible logical range
                const currentRange = timeScale.getVisibleLogicalRange();
                
                if (currentRange) {
                    // Start stepping forward every 1.2 seconds
                    replayInterval = setInterval(() => {
                        if (!replayActive) {
                            if (replayInterval) clearInterval(replayInterval);
                            return;
                        }
                        
                        try {
                            const currentTimeScale = getChart()?.timeScale();
                            if (currentTimeScale) {
                                const range = currentTimeScale.getVisibleLogicalRange();
                                if (range) {
                                    // Move forward one bar
                                    const newFrom = range.from + 1;
                                    const newTo = range.to + 1;
                                    currentTimeScale.setVisibleLogicalRange({ from: newFrom, to: newTo });
                                }
                            }
                        } catch(e) {
                            // If error occurs, try alternative method
                            try {
                                const fallbackChart = getChart();
                                if (fallbackChart && fallbackChart.executeActionById) {
                                    fallbackChart.executeActionById("timeScaleStepRight");
                                }
                            } catch(err) {}
                        }
                    }, 1200);
                } else {
                    // Fallback: use action ID
                    replayInterval = setInterval(() => {
                        if (!replayActive) return;
                        try {
                            const fallbackChart = getChart();
                            if (fallbackChart && fallbackChart.executeActionById) {
                                fallbackChart.executeActionById("timeScaleStepRight");
                            }
                        } catch(e) {}
                    }, 1200);
                }
                
            } catch (error) {
                console.error("Error starting replay mode:", error);
                replayActive = false;
                updateReplayUI(false);
            }
        }
        
        // Stop replay mode
        function stopReplayMode() {
            if (replayInterval) {
                clearInterval(replayInterval);
                replayInterval = null;
            }
            replayActive = false;
            updateReplayUI(false);
        }
        
        // Update UI for replay button
        function updateReplayUI(active) {
            const replayBtn = document.getElementById('replayButton');
            const activeDot = document.getElementById('replayActiveDot');
            
            if (active) {
                if (replayBtn) replayBtn.classList.add('active');
                if (activeDot) activeDot.style.display = 'block';
            } else {
                if (replayBtn) replayBtn.classList.remove('active');
                if (activeDot) activeDot.style.display = 'none';
            }
        }
        
        // Toggle replay mode
        window.toggleReplayMode = function() {
            if (replayActive) {
                stopReplayMode();
            } else {
                if (replayInterval) {
                    clearInterval(replayInterval);
                    replayInterval = null;
                }
                startReplayMode();
            }
        };
        
        // Cleanup replay when switching pairs
        function stopReplayAndCleanup() {
            if (replayInterval) {
                clearInterval(replayInterval);
                replayInterval = null;
            }
            replayActive = false;
            updateReplayUI(false);
        }
        
        // Initialize TradingView Widget with full interactivity
        function initTradingViewWidget(symbol) {
            // Stop any active replay
            stopReplayAndCleanup();
            
            // Map symbols to TradingView format
            const tvSymbol = symbol === 'XAUUSD' ? 'FX_IDC:XAUUSD' : 'COINBASE:BTCUSD';
            
            // Destroy existing widget if any
            if (tvWidget && typeof tvWidget.remove === 'function') {
                try {
                    tvWidget.remove();
                } catch(e) {}
                tvWidget = null;
            }
            
            // Create TradingView widget with ALL features enabled for full interactivity
            // This allows axis movement, camera/download button, zoom, pan, etc.
            tvWidget = new TradingView.widget({
                "width": "100%",
                "height": "100%",
                "symbol": tvSymbol,
                "interval": "15",
                "timezone": "exchange",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#0f1a24",
                "enable_publishing": true,           // Enables camera/download feature
                "hide_side_toolbar": false,           // Show full toolbar
                "allow_symbol_change": true,          // Allow symbol changes
                "container_id": "tv_chart",
                "studies": [
                    "MASimple@tv-basicstudies"
                ],
                "disabled_features": [],               // No disabled features - full access
                "enabled_features": [
                    "show_hide_button_on_legend",
                    "side_toolbar_in_fullscreen_mode",
                    "keep_left_toolbar_visible_on_small_screens"
                ],
                "loading_screen": { "backgroundColor": "#0f1a24" },
                "save_image": true,                    // Enable image saving (camera icon)
                "snapshot": true,                      // Enable snapshot feature
                "chart_only": false                    // Show full toolbar with camera
            });
            
            // After chart loads, ensure replay button is reset and chart is fully interactive
            tvWidget.onChartReady(() => {
                updateReplayUI(false);
                
                // Make sure the chart is fully interactive - axis can be moved, camera is accessible
                const chart = getChart();
                if (chart) {
                    // Ensure time scale and price scale are movable
                    const timeScale = chart.timeScale();
                    const priceScale = chart.priceScale();
                    
                    // Log that chart is ready with full interactivity
                    console.log("Chart ready - Camera icon available in toolbar, axis fully movable");
                }
            });
        }
        
        // Switch between XAUUSD and BTCUSD
        window.switchPair = function(pair) {
            if (currentPair === pair) return;
            currentPair = pair;
            
            // Update buttons
            document.getElementById('btn-xau').classList.remove('active');
            document.getElementById('btn-btc').classList.remove('active');
            document.getElementById(pair === 'XAUUSD' ? 'btn-xau' : 'btn-btc').classList.add('active');
            
            // Stop replay mode
            stopReplayAndCleanup();
            
            // Reinit chart with new symbol
            initTradingViewWidget(pair);
        };
        
        // Initialize on page load
        window.onload = function() {
            initTradingViewWidget('XAUUSD');
            
            // Add tooltip title for replay button
            const replayBtnElem = document.getElementById('replayButton');
            if (replayBtnElem) {
                replayBtnElem.setAttribute('title', 'Replay Mode - Step through historical bars');
            }
        };
        
        // Handle window resize
        window.addEventListener('resize', function() {
            if (tvWidget && tvWidget.resize) {
                try {
                    tvWidget.resize();
                } catch(e) {}
            }
        });
        
        // Clean up before page unload
        window.addEventListener('beforeunload', function() {
            if (replayInterval) {
                clearInterval(replayInterval);
            }
            if (tvWidget && typeof tvWidget.remove === 'function') {
                try {
                    tvWidget.remove();
                } catch(e) {}
            }
        });
        
        // Ensure axis can be moved - this is handled by TradingView natively
        // The chart's X and Y axes are fully interactive:
        // - Drag left/right on chart = move time axis
        // - Drag up/down on price scale = move price axis
        // - Double click = reset view
        // - Camera icon appears in top toolbar for downloading images
        // All these features are preserved and fully functional
    </script>
</body>
    </html>
