<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Interface</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0e0e0e;
      color: #ffffff;
    }.container {
  display: flex;
  height: 100vh;
  flex-direction: column;
}

.top-bar {
  height: 50px;
  background: #1a1a1a;
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 10px;
}

.top-bar button {
  background: #2b2b2b;
  border: none;
  color: white;
  padding: 6px 10px;
  cursor: pointer;
  border-radius: 4px;
}

.main {
  display: flex;
  flex: 1;
}

.sidebar {
  width: 60px;
  background: #1a1a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 10px;
  gap: 10px;
}

.sidebar button {
  width: 40px;
  height: 40px;
  background: #2b2b2b;
  border: none;
  color: white;
  border-radius: 4px;
  cursor: pointer;
}

.chart-container {
  flex: 1;
  position: relative;
}

#chart {
  width: 100%;
  height: 100%;
}

.footer {
  height: 30px;
  background: #1a1a1a;
  display: flex;
  align-items: center;
  padding: 0 10px;
  font-size: 12px;
  color: #aaa;
}

  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <button onclick="loadData()">Load Data</button>
      <button onclick="toggleTheme()">Toggle Theme</button>
      <span>Trading Dashboard</span>
    </div><div class="main">
  <div class="sidebar">
    <button title="Crosshair">+</button>
    <button title="Line">/</button>
    <button title="Draw">✏️</button>
    <button title="Settings">⚙️</button>
  </div>

  <div class="chart-container">
    <div id="chart"></div>
  </div>
</div>

<div class="footer">
  Status: Ready
</div>

  </div>  <script>
    const chartContainer = document.getElementById('chart');

    const chart = LightweightCharts.createChart(chartContainer, {
      layout: {
        background: { color: '#0e0e0e' },
        textColor: '#ffffff'
      },
      grid: {
        vertLines: { color: '#2a2a2a' },
        horzLines: { color: '#2a2a2a' }
      },
      width: chartContainer.clientWidth,
      height: chartContainer.clientHeight
    });

    const candleSeries = chart.addCandlestickSeries();

    function generateSampleData() {
      const data = [];
      let time = Math.floor(Date.now() / 1000) - 5000;
      let price = 100;

      for (let i = 0; i < 200; i++) {
        const open = price;
        const close = open + (Math.random() - 0.5) * 2;
        const high = Math.max(open, close) + Math.random();
        const low = Math.min(open, close) - Math.random();

        data.push({
          time: time + i * 60,
          open,
          high,
          low,
          close
        });

        price = close;
      }

      return data;
    }

    function loadData() {
      const data = generateSampleData();
      candleSeries.setData(data);
    }

    function toggleTheme() {
      alert("Theme toggle placeholder (extend this)");
    }

    window.addEventListener('resize', () => {
      chart.applyOptions({
        width: chartContainer.clientWidth,
        height: chartContainer.clientHeight
      });
    });

    // Initial load
    loadData();
  </script></body>
</html>
