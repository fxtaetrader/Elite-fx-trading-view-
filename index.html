<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TradingView · Fullscreen</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0b1017; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Simple minimal header */
        .header {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f1a24;
            border-bottom: 1px solid #2a3f54;
            flex-shrink: 0;
        }
        
        .logo { 
            font-size: 1.2rem; 
            font-weight: 600; 
            color: #ffb347;
        }
        
        .pair-selector {
            display: flex;
            gap: 10px;
        }
        
        .pair-btn {
            background: #16222e;
            border: 1px solid #3a5670;
            border-radius: 30px;
            padding: 6px 16px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .pair-btn.active {
            background: #1f364d;
            border-color: #ffb347;
            color: #ffd966;
        }
        
        /* Fullscreen chart container */
        .chart-container {
            flex: 1;
            width: 100%;
            background: #0f1a24;
            overflow: hidden;
            position: relative;
        }
        
        #tv_chart {
            width: 100%;
            height: 100%;
        }
        
        /* Custom replay button styling - will be injected into TradingView toolbar */
        .tv-custom-replay-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 4px;
            background: transparent;
            border: none;
            cursor: pointer;
            margin: 0 2px;
            transition: all 0.2s ease;
            position: relative;
            color: #b2b5be;
            font-size: 18px;
        }
        
        .tv-custom-replay-btn:hover {
            background: #2a2e39;
            color: #ffb347;
        }
        
        .tv-custom-replay-btn.active {
            color: #ffb347;
            background: #2a2e39;
        }
        
        .tv-custom-replay-btn.active::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: #ffb347;
            border-radius: 50%;
            animation: replayPulse 1s infinite;
        }
        
        @keyframes replayPulse {
            0%, 100% { opacity: 0.4; transform: translateX(-50%) scale(0.8); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.2); }
        }
        
        /* Tooltip styling for replay button */
        .tv-custom-replay-btn[data-tooltip]::before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a36;
            color: #ffd966;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            margin-bottom: 8px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            z-index: 1000;
            border: 1px solid #3a5670;
        }
        
        .tv-custom-replay-btn:hover::before {
            opacity: 1;
        }
        
        /* Make sure the camera icon stays accessible - no overlapping */
        .tv-custom-replay-btn {
            order: 10;
        }
        
        /* Ensure toolbar items are properly spaced */
        .group-UJoUyYaU {
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>
    <!-- Minimal header -->
    <div class="header">
        <div class="logo">📊 TV CHARTS</div>
        <div class="pair-selector">
            <div class="pair-btn active" id="btn-xau" onclick="switchPair('XAUUSD')">XAUUSD</div>
            <div class="pair-btn" id="btn-btc" onclick="switchPair('BTCUSD')">BTCUSD</div>
        </div>
    </div>
    
    <!-- Fullscreen TradingView Chart -->
    <div class="chart-container">
        <div id="tv_chart"></div>
    </div>

    <!-- TradingView Widget Script -->
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let currentPair = 'XAUUSD';
        let tvWidget = null;
        let replayActive = false;
        let replayInterval = null;
        let replayButtonInjected = false;
        
        // Helper to get the chart instance from widget
        function getChart() {
            if (tvWidget && tvWidget._api) {
                return tvWidget._api;
            }
            return null;
        }
        
        // Inject replay button into TradingView's toolbar (near indicators area)
        function injectReplayButton() {
            if (replayButtonInjected) return;
            
            // Wait for TradingView toolbar to be available
            const checkToolbar = setInterval(() => {
                // Look for the toolbar container - TradingView uses specific classes
                // We want to insert near the indicators/studies section
                const toolbarContainer = document.querySelector('[class*="toolbar"]') || 
                                        document.querySelector('[class*="buttons-"]') ||
                                        document.querySelector('.group-UJoUyYaU');
                
                // More specific: look for the right-side toolbar group where indicators and camera live
                const rightToolbarGroup = document.querySelector('[class*="right-"]') ||
                                         document.querySelector('[class*="items-"]');
                
                // Find the container that holds the indicator button and camera
                let targetContainer = null;
                
                // Try to find the group that contains the camera/snapshot button
                const allToolbarGroups = document.querySelectorAll('[class*="group"]');
                for (let group of allToolbarGroups) {
                    if (group.querySelector('[class*="camera"]') || 
                        group.querySelector('[class*="snapshot"]') ||
                        group.innerHTML.includes('camera') ||
                        group.innerHTML.includes('snapshot')) {
                        targetContainer = group;
                        break;
                    }
                }
                
                // If not found by camera, look for any visible toolbar group on the right side
                if (!targetContainer) {
                    const rightSideElements = document.querySelectorAll('[class*="right"], [class*="end"]');
                    for (let el of rightSideElements) {
                        if (el.children && el.children.length > 0 && el.offsetParent !== null) {
                            targetContainer = el;
                            break;
                        }
                    }
                }
                
                // Fallback: use the main toolbar area
                if (!targetContainer && toolbarContainer) {
                    targetContainer = toolbarContainer;
                }
                
                if (targetContainer && !document.getElementById('tv-replay-injected-btn')) {
                    // Create replay button
                    const replayBtn = document.createElement('button');
                    replayBtn.id = 'tv-replay-injected-btn';
                    replayBtn.className = 'tv-custom-replay-btn';
                    replayBtn.setAttribute('data-tooltip', 'Replay Mode - Step through bars');
                    replayBtn.innerHTML = '⏪';
                    replayBtn.onclick = toggleReplayMode;
                    
                    // Insert before the camera/indicator area, not after
                    // This ensures camera icon remains accessible
                    const firstChild = targetContainer.firstChild;
                    if (firstChild) {
                        targetContainer.insertBefore(replayBtn, firstChild);
                    } else {
                        targetContainer.appendChild(replayBtn);
                    }
                    
                    replayButtonInjected = true;
                    clearInterval(checkToolbar);
                    console.log("Replay button injected into TradingView toolbar");
                } else if (targetContainer && document.getElementById('tv-replay-injected-btn')) {
                    clearInterval(checkToolbar);
                }
            }, 500);
            
            // Timeout after 10 seconds to stop checking
            setTimeout(() => clearInterval(checkToolbar), 10000);
        }
        
        // Update replay button active state
        function updateReplayButtonState(active) {
            const replayBtn = document.getElementById('tv-replay-injected-btn');
            if (replayBtn) {
                if (active) {
                    replayBtn.classList.add('active');
                    replayBtn.setAttribute('data-tooltip', 'Replay Active - Click to stop');
                } else {
                    replayBtn.classList.remove('active');
                    replayBtn.setAttribute('data-tooltip', 'Replay Mode - Step through bars');
                }
            }
        }
        
        // Start replay mode - moves chart bars forward automatically
        function startReplayMode() {
            if (replayActive) return;
            
            try {
                const chart = getChart();
                if (!chart) {
                    console.warn("Chart API not ready yet, retrying...");
                    setTimeout(startReplayMode, 500);
                    return;
                }
                
                replayActive = true;
                updateReplayButtonState(true);
                
                // Clear any existing interval
                if (replayInterval) clearInterval(replayInterval);
                
                // Use chart's timeScale to step forward one bar at a time
                const timeScale = chart.timeScale();
                
                // Get current visible logical range
                const currentRange = timeScale.getVisibleLogicalRange();
                
                if (currentRange) {
                    // Start stepping forward every 1.2 seconds
                    replayInterval = setInterval(() => {
                        if (!replayActive) {
                            if (replayInterval) clearInterval(replayInterval);
                            return;
                        }
                        
                        try {
                            const currentChart = getChart();
                            if (currentChart) {
                                const currentTimeScale = currentChart.timeScale();
                                if (currentTimeScale) {
                                    const range = currentTimeScale.getVisibleLogicalRange();
                                    if (range) {
                                        // Move forward one bar
                                        const newFrom = range.from + 1;
                                        const newTo = range.to + 1;
                                        currentTimeScale.setVisibleLogicalRange({ from: newFrom, to: newTo });
                                    }
                                }
                            }
                        } catch(e) {
                            // If error occurs, try alternative method
                            try {
                                const fallbackChart = getChart();
                                if (fallbackChart && fallbackChart.executeActionById) {
                                    fallbackChart.executeActionById("timeScaleStepRight");
                                }
                            } catch(err) {}
                        }
                    }, 1200);
                } else {
                    // Fallback: use action ID
                    replayInterval = setInterval(() => {
                        if (!replayActive) return;
                        try {
                            const fallbackChart = getChart();
                            if (fallbackChart && fallbackChart.executeActionById) {
                                fallbackChart.executeActionById("timeScaleStepRight");
                            }
                        } catch(e) {}
                    }, 1200);
                }
                
            } catch (error) {
                console.error("Error starting replay mode:", error);
                replayActive = false;
                updateReplayButtonState(false);
            }
        }
        
        // Stop replay mode
        function stopReplayMode() {
            if (replayInterval) {
                clearInterval(replayInterval);
                replayInterval = null;
            }
            replayActive = false;
            updateReplayButtonState(false);
        }
        
        // Toggle replay mode
        window.toggleReplayMode = function() {
            if (replayActive) {
                stopReplayMode();
            } else {
                if (replayInterval) {
                    clearInterval(replayInterval);
                    replayInterval = null;
                }
                startReplayMode();
            }
        };
        
        // Cleanup replay when switching pairs
        function stopReplayAndCleanup() {
            if (replayInterval) {
                clearInterval(replayInterval);
                replayInterval = null;
            }
            replayActive = false;
            updateReplayButtonState(false);
        }
        
        // Initialize TradingView Widget with full interactivity
        function initTradingViewWidget(symbol) {
            // Stop any active replay
            stopReplayAndCleanup();
            
            // Reset injection flag for new widget
            replayButtonInjected = false;
            
            // Map symbols to TradingView format
            const tvSymbol = symbol === 'XAUUSD' ? 'FX_IDC:XAUUSD' : 'COINBASE:BTCUSD';
            
            // Destroy existing widget if any
            if (tvWidget && typeof tvWidget.remove === 'function') {
                try {
                    tvWidget.remove();
                } catch(e) {}
                tvWidget = null;
            }
            
            // Clear container
            const container = document.getElementById('tv_chart');
            if (container) {
                container.innerHTML = '';
            }
            
            // Create TradingView widget with ALL features enabled for full interactivity
            // This allows axis movement, camera/download button, zoom, pan, etc.
            tvWidget = new TradingView.widget({
                "width": "100%",
                "height": "100%",
                "symbol": tvSymbol,
                "interval": "15",
                "timezone": "exchange",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#0f1a24",
                "enable_publishing": true,           // Enables camera/download feature
                "hide_side_toolbar": false,           // Show full toolbar
                "allow_symbol_change": true,          // Allow symbol changes
                "container_id": "tv_chart",
                "studies": [
                    "MASimple@tv-basicstudies"
                ],
                "disabled_features": [],               // No disabled features - full access
                "enabled_features": [
                    "show_hide_button_on_legend",
                    "side_toolbar_in_fullscreen_mode",
                    "keep_left_toolbar_visible_on_small_screens"
                ],
                "loading_screen": { "backgroundColor": "#0f1a24" },
                "save_image": true,                    // Enable image saving (camera icon)
                "snapshot": true,                      // Enable snapshot feature
                "chart_only": false                    // Show full toolbar with camera
            });
            
            // After chart loads, inject replay button and ensure chart is fully interactive
            tvWidget.onChartReady(() => {
                // Inject replay button into toolbar near indicators
                injectReplayButton();
                
                // Make sure the chart is fully interactive - axis can be moved, camera is accessible
                const chart = getChart();
                if (chart) {
                    console.log("Chart ready - Camera icon available in toolbar, axis fully movable, replay button injected near indicators");
                }
                
                // Watch for DOM changes to re-inject if needed (for TradingView dynamic updates)
                const observer = new MutationObserver(() => {
                    if (!document.getElementById('tv-replay-injected-btn') && tvWidget) {
                        injectReplayButton();
                    }
                });
                
                observer.observe(document.body, {
                    childList: true,
                    subtree: true
                });
                
                // Store observer to disconnect later
                if (window._tvObserver) window._tvObserver.disconnect();
                window._tvObserver = observer;
            });
        }
        
        // Switch between XAUUSD and BTCUSD
        window.switchPair = function(pair) {
            if (currentPair === pair) return;
            currentPair = pair;
            
            // Update buttons
            document.getElementById('btn-xau').classList.remove('active');
            document.getElementById('btn-btc').classList.remove('active');
            document.getElementById(pair === 'XAUUSD' ? 'btn-xau' : 'btn-btc').classList.add('active');
            
            // Stop replay mode
            stopReplayAndCleanup();
            
            // Reinit chart with new symbol
            initTradingViewWidget(pair);
        };
        
        // Initialize on page load
        window.onload = function() {
            initTradingViewWidget('XAUUSD');
        };
        
        // Handle window resize
        window.addEventListener('resize', function() {
            if (tvWidget && tvWidget.resize) {
                try {
                    tvWidget.resize();
                } catch(e) {}
            }
        });
        
        // Clean up before page unload
        window.addEventListener('beforeunload', function() {
            if (replayInterval) {
                clearInterval(replayInterval);
            }
            if (window._tvObserver) {
                window._tvObserver.disconnect();
            }
            if (tvWidget && typeof tvWidget.remove === 'function') {
                try {
                    tvWidget.remove();
                } catch(e) {}
            }
        });
        
        // Export for debugging
        window.getReplayStatus = () => ({ active: replayActive });
    </script>
</body>
</html>
