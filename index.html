<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Trading View</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #0b1017;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.header {
    padding: 10px 15px;
    display: flex;
    justify-content: space-between;
    background: #0f1a24;
    border-bottom: 1px solid #2a3f54;
}

.logo { color: #ffb347; font-weight: bold; }
#balance { color: #ffd966; font-weight: bold; }

.toolbar {
    display: flex;
    gap: 8px;
    padding: 8px;
    background: #0f1a24;
    border-bottom: 1px solid #2a3f54;
}

.tool-btn {
    background: #16222e;
    border: 1px solid #3a5670;
    color: #ffd966;
    padding: 6px 10px;
    cursor: pointer;
}

.chart-container {
    position: relative;
    flex: 1;
}

#tv_chart {
    width: 100%;
    height: 100%;
}

.replay-controls {
    position: absolute;
    top: 60px;
    left: 20px;
    display: flex;
    gap: 5px;
    z-index: 999;
}

.trade-controls {
    position: absolute;
    top: 100px;
    left: 20px;
    display: flex;
    gap: 5px;
    z-index: 999;
}

button {
    cursor: pointer;
}

.buy { background: green; color: white; padding: 6px; }
.sell { background: red; color: white; padding: 6px; }

</style>
</head>

<body>

<div class="header">
    <div class="logo">📊 ELITE TV</div>
    <div id="balance">Balance: $1000</div>
</div>

<div class="toolbar">
    <button class="tool-btn">Indicators</button>
    <button class="tool-btn">Replay</button>
    <button class="tool-btn">Draw</button>
</div>

<div class="chart-container">

    <div class="replay-controls">
        <button onclick="startReplay()">⏪</button>
        <button onclick="playReplay()">▶️</button>
        <button onclick="pauseReplay()">⏸</button>
        <button onclick="stepReplay()">⏭</button>
    </div>

    <div class="trade-controls">
        <button class="buy" onclick="buyTrade()">BUY</button>
        <button class="sell" onclick="sellTrade()">SELL</button>
    </div>

    <div id="tv_chart"></div>
</div>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<script>
let chart, candleSeries;
let entryLine, slLine, tpLine;

let allData = [];
let replayData = [];
let replayIndex = 0;
let isPlaying = false;
let speed = 400;

let balance = 1000;
let currentTrade = null;

// Chart
function initChart() {
    const container = document.getElementById('tv_chart');

    chart = LightweightCharts.createChart(container, {
        layout: { background: { color: '#0f1a24' }, textColor: '#d1d4dc' },
        grid: {
            vertLines: { color: '#1f364d' },
            horzLines: { color: '#1f364d' },
        },
        width: container.clientWidth,
        height: container.clientHeight,
    });

    candleSeries = chart.addCandlestickSeries();
}

// Data
function generateData(basePrice) {
    let data = [];
    let time = 1700000000;
    let price = basePrice;

    for (let i = 0; i < 500; i++) {
        let open = price;
        let close = open + (Math.random() - 0.5) * 10;
        let high = Math.max(open, close) + Math.random() * 5;
        let low = Math.min(open, close) - Math.random() * 5;

        data.push({ time, open, high, low, close });

        price = close;
        time += 60;
    }

    return data;
}

// Replay
function startReplay() {
    replayIndex = 0;
    replayData = [];
    isPlaying = false;
    candleSeries.setData([]);
}

function playReplay() {
    isPlaying = true;
    runReplay();
}

function pauseReplay() {
    isPlaying = false;
}

function stepReplay() {
    if (replayIndex < allData.length) {
        let candle = allData[replayIndex];
        replayData.push(candle);
        candleSeries.setData(replayData);
        replayIndex++;
        checkTrade(candle);
    }
}

function runReplay() {
    if (!isPlaying) return;
    stepReplay();
    setTimeout(runReplay, speed);
}

// 🔥 DRAW LINES
function drawTradeLines(entry, sl, tp) {
    entryLine = candleSeries.createPriceLine({
        price: entry,
        color: 'blue',
        lineWidth: 2,
        title: 'Entry'
    });

    slLine = candleSeries.createPriceLine({
        price: sl,
        color: 'red',
        lineWidth: 2,
        title: 'SL'
    });

    tpLine = candleSeries.createPriceLine({
        price: tp,
        color: 'green',
        lineWidth: 2,
        title: 'TP'
    });
}

// REMOVE LINES
function removeLines() {
    if (entryLine) candleSeries.removePriceLine(entryLine);
    if (slLine) candleSeries.removePriceLine(slLine);
    if (tpLine) candleSeries.removePriceLine(tpLine);
}

// Trading
function buyTrade() {
    if (currentTrade) return;

    let c = replayData[replayData.length - 1];

    let entry = c.close;
    let sl = c.low;
    let risk = entry - sl;
    let tp = entry + risk * 3;

    currentTrade = { type: "BUY", entry, sl, tp };

    drawTradeLines(entry, sl, tp);
}

function sellTrade() {
    if (currentTrade) return;

    let c = replayData[replayData.length - 1];

    let entry = c.close;
    let sl = c.high;
    let risk = sl - entry;
    let tp = entry - risk * 3;

    currentTrade = { type: "SELL", entry, sl, tp };

    drawTradeLines(entry, sl, tp);
}

// Check Trade
function checkTrade(c) {
    if (!currentTrade) return;

    if (currentTrade.type === "BUY") {
        if (c.low <= currentTrade.sl) closeTrade(-1);
        else if (c.high >= currentTrade.tp) closeTrade(1);
    }

    if (currentTrade.type === "SELL") {
        if (c.high >= currentTrade.sl) closeTrade(-1);
        else if (c.low <= currentTrade.tp) closeTrade(1);
    }
}

// Close Trade
function closeTrade(result) {
    if (result === 1) balance += 30;
    else balance -= 10;

    document.getElementById("balance").innerText = "Balance: $" + balance;

    removeLines();
    currentTrade = null;
}

// Init
window.onload = function () {
    initChart();
    allData = generateData(1900);
    startReplay();
};

window.addEventListener('resize', function () {
    chart.resize(
        document.getElementById('tv_chart').clientWidth,
        document.getElementById('tv_chart').clientHeight
    );
});
</script>

</body>
</html>
