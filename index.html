<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TradingView · Fullscreen</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0b1017; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Simple minimal header */
        .header {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f1a24;
            border-bottom: 1px solid #2a3f54;
            flex-shrink: 0;
        }
        
        .logo { 
            font-size: 1.2rem; 
            font-weight: 600; 
            color: #ffb347;
        }
        
        .pair-selector {
            display: flex;
            gap: 10px;
        }
        
        .pair-btn {
            background: #16222e;
            border: 1px solid #3a5670;
            border-radius: 30px;
            padding: 6px 16px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .pair-btn.active {
            background: #1f364d;
            border-color: #ffb347;
            color: #ffd966;
        }
        
        /* Fullscreen chart container */
        .chart-container {
            flex: 1;
            width: 100%;
            background: #0f1a24;
            overflow: hidden;
            position: relative;
        }
        
        #tv_chart {
            width: 100%;
            height: 100%;
        }
        
        /* Custom replay button styling - will be injected into TradingView toolbar */
        .tv-custom-replay-btn {
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            width: 32px !important;
            height: 32px !important;
            border-radius: 4px !important;
            background: transparent !important;
            border: none !important;
            cursor: pointer !important;
            margin: 0 2px !important;
            transition: all 0.2s ease !important;
            position: relative !important;
            color: #b2b5be !important;
            font-size: 18px !important;
            vertical-align: middle !important;
        }
        
        .tv-custom-replay-btn:hover {
            background: #2a2e39 !important;
            color: #ffb347 !important;
        }
        
        .tv-custom-replay-btn.active {
            color: #ffb347 !important;
            background: #2a2e39 !important;
        }
        
        .tv-custom-replay-btn.active::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: #ffb347;
            border-radius: 50%;
            animation: replayPulse 1s infinite;
        }
        
        @keyframes replayPulse {
            0%, 100% { opacity: 0.4; transform: translateX(-50%) scale(0.8); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.2); }
        }
        
        /* Tooltip styling for replay button */
        .tv-custom-replay-btn[data-tooltip]::before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a36;
            color: #ffd966;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            margin-bottom: 8px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            z-index: 1000;
            border: 1px solid #3a5670;
        }
        
        .tv-custom-replay-btn:hover::before {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Minimal header -->
    <div class="header">
        <div class="logo">📊 TV CHARTS</div>
        <div class="pair-selector">
            <div class="pair-btn active" id="btn-xau" onclick="switchPair('XAUUSD')">XAUUSD</div>
            <div class="pair-btn" id="btn-btc" onclick="switchPair('BTCUSD')">BTCUSD</div>
        </div>
    </div>
    
    <!-- Fullscreen TradingView Chart -->
    <div class="chart-container">
        <div id="tv_chart"></div>
    </div>

    <!-- TradingView Widget Script -->
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let currentPair = 'XAUUSD';
        let tvWidget = null;
        let replayActive = false;
        let replayInterval = null;
        let replayButtonInjected = false;
        let injectionAttempts = 0;
        
        // Helper to get the chart instance from widget
        function getChart() {
            if (tvWidget && tvWidget._api) {
                return tvWidget._api;
            }
            return null;
        }
        
        // Find the best spot to insert replay button - near indicators and camera
        function findToolbarContainer() {
            // Method 1: Look for the right-side toolbar container by common TradingView class patterns
            const possibleSelectors = [
                '.items-3XjXGrrQ',
                '.buttons-3XjXGrrQ',
                '[class*="toolbar-widget"]',
                '[class*="top-toolbar"]',
                '[class*="chart-toolbar"]',
                '.group-3XjXGrrQ',
                '.right-3XjXGrrQ',
                '[class*="right-toolbar"]'
            ];
            
            for (let selector of possibleSelectors) {
                const el = document.querySelector(selector);
                if (el && el.children && el.children.length > 0) {
                    return el;
                }
            }
            
            // Method 2: Find any container that has buttons and is visible on the top right
            const allDivs = document.querySelectorAll('div');
            for (let div of allDivs) {
                if (div.children && div.children.length > 0) {
                    // Check if this div contains icon buttons (like indicators, camera)
                    const hasButtons = Array.from(div.children).some(child => 
                        child.tagName === 'BUTTON' || 
                        child.querySelector('button') ||
                        child.innerHTML.includes('camera') ||
                        child.innerHTML.includes('indicator')
                    );
                    if (hasButtons && div.offsetParent !== null) {
                        const rect = div.getBoundingClientRect();
                        // Top right area of the screen
                        if (rect.top < 100 && rect.right > window.innerWidth - 200) {
                            return div;
                        }
                    }
                }
            }
            
            return null;
        }
        
        // Inject replay button into TradingView's toolbar (near indicators/camera area)
        function injectReplayButton() {
            if (replayButtonInjected) {
                // Check if button still exists, if not, reinject
                if (!document.getElementById('tv-replay-injected-btn')) {
                    replayButtonInjected = false;
                } else {
                    return;
                }
            }
            
            injectionAttempts++;
            if (injectionAttempts > 20) {
                console.warn("Could not inject replay button after multiple attempts");
                return;
            }
            
            const targetContainer = findToolbarContainer();
            
            if (targetContainer && !document.getElementById('tv-replay-injected-btn')) {
                // Create replay button
                const replayBtn = document.createElement('button');
                replayBtn.id = 'tv-replay-injected-btn';
                replayBtn.className = 'tv-custom-replay-btn';
                replayBtn.setAttribute('data-tooltip', 'Replay Mode - Step through bars');
                replayBtn.innerHTML = '⏪';
                replayBtn.onclick = (e) => {
                    e.stopPropagation();
                    toggleReplayMode();
                };
                
                // Insert at the beginning of the toolbar so it doesn't cover camera
                if (targetContainer.firstChild) {
                    targetContainer.insertBefore(replayBtn, targetContainer.firstChild);
                } else {
                    targetContainer.appendChild(replayBtn);
                }
                
                replayButtonInjected = true;
                console.log("Replay button injected into TradingView toolbar");
                return true;
            }
            
            return false;
        }
        
        // Continuously try to inject until successful
        function waitAndInject() {
            if (injectReplayButton()) {
                return;
            }
            setTimeout(waitAndInject, 1000);
        }
        
        // Update replay button active state
        function updateReplayButtonState(active) {
            const replayBtn = document.getElementById('tv-replay-injected-btn');
            if (replayBtn) {
                if (active) {
                    replayBtn.classList.add('active');
                    replayBtn.setAttribute('data-tooltip', 'Replay Active - Click to stop');
                } else {
                    replayBtn.classList.remove('active');
                    replayBtn.setAttribute('data-tooltip', 'Replay Mode - Step through bars');
                }
            }
        }
        
        // Start replay mode - moves chart bars forward automatically
        function startReplayMode() {
            if (replayActive) return;
            
            try {
                const chart = getChart();
                if (!chart) {
                    console.warn("Chart API not ready yet, retrying...");
                    setTimeout(startReplayMode, 500);
                    return;
                }
                
                replayActive = true;
                updateReplayButtonState(true);
                
                // Clear any existing interval
                if (replayInterval) clearInterval(replayInterval);
                
                // Use chart's timeScale to step forward one bar at a time
                const timeScale = chart.timeScale();
                
                // Get current visible logical range
                const currentRange = timeScale.getVisibleLogicalRange();
                
                if (currentRange) {
                    // Start stepping forward every 1.2 seconds
                    replayInterval = setInterval(() => {
                        if (!replayActive) {
                            if (replayInterval) clearInterval(replayInterval);
                            return;
                        }
                        
                        try {
                            const currentChart = getChart();
                            if (currentChart) {
                                const currentTimeScale = currentChart.timeScale();
                                if (currentTimeScale) {
                                    const range = currentTimeScale.getVisibleLogicalRange();
                                    if (range) {
                                        // Move forward one bar
                                        const newFrom = range.from + 1;
                                        const newTo = range.to + 1;
                                        currentTimeScale.setVisibleLogicalRange({ from: newFrom, to: newTo });
                                    }
                                }
                            }
                        } catch(e) {
                            // If error occurs, try alternative method
                            try {
                                const fallbackChart = getChart();
                                if (fallbackChart && fallbackChart.executeActionById) {
                                    fallbackChart.executeActionById("timeScaleStepRight");
                                }
                            } catch(err) {}
                        }
                    }, 1200);
                } else {
                    // Fallback: use action ID
                    replayInterval = setInterval(() => {
                        if (!replayActive) return;
                        try {
                            const fallbackChart = getChart();
                            if (fallbackChart && fallbackChart.executeActionById) {
                                fallbackChart.executeActionById("timeScaleStepRight");
                            }
                        } catch(e) {}
                    }, 1200);
                }
                
            } catch (error) {
                console.error("Error starting replay mode:", error);
                replayActive = false;
                updateReplayButtonState(false);
            }
        }
        
        // Stop replay mode
        function stopReplayMode() {
            if (replayInterval) {
                clearInterval(replayInterval);
                replayInterval = null;
            }
            replayActive = false;
            updateReplayButtonState(false);
        }
        
        // Toggle replay mode
        window.toggleReplayMode = function() {
            if (replayActive) {
                stopReplayMode();
            } else {
                if (replayInterval) {
                    clearInterval(replayInterval);
                    replayInterval = null;
                }
                startReplayMode();
            }
        };
        
        // Cleanup replay when switching pairs
        function stopReplayAndCleanup() {
            if (replayInterval) {
                clearInterval(replayInterval);
                replayInterval = null;
            }
            replayActive = false;
            updateReplayButtonState(false);
        }
        
        // Initialize TradingView Widget with full interactivity
        function initTradingViewWidget(symbol) {
            // Stop any active replay
            stopReplayAndCleanup();
            
            // Reset injection flag and attempts
            replayButtonInjected = false;
            injectionAttempts = 0;
            
            // Map symbols to TradingView format
            const tvSymbol = symbol === 'XAUUSD' ? 'FX_IDC:XAUUSD' : 'COINBASE:BTCUSD';
            
            // Destroy existing widget if any
            if (tvWidget && typeof tvWidget.remove === 'function') {
                try {
                    tvWidget.remove();
                } catch(e) {}
                tvWidget = null;
            }
            
            // Clear container
            const container = document.getElementById('tv_chart');
            if (container) {
                container.innerHTML = '';
            }
            
            // Create TradingView widget with ALL features enabled for full interactivity
            // This allows axis movement, camera/download button, zoom, pan, etc.
            tvWidget = new TradingView.widget({
                "width": "100%",
                "height": "100%",
                "symbol": tvSymbol,
                "interval": "15",
                "timezone": "exchange",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#0f1a24",
                "enable_publishing": true,           // Enables camera/download feature
                "hide_side_toolbar": false,           // Show full toolbar
                "allow_symbol_change": true,          // Allow symbol changes
                "container_id": "tv_chart",
                "studies": [
                    "MASimple@tv-basicstudies"
                ],
                "disabled_features": [],               // No disabled features - full access
                "enabled_features": [
                    "show_hide_button_on_legend",
                    "side_toolbar_in_fullscreen_mode",
                    "keep_left_toolbar_visible_on_small_screens"
                ],
                "loading_screen": { "backgroundColor": "#0f1a24" },
                "save_image": true,                    // Enable image saving (camera icon)
                "snapshot": true,                      // Enable snapshot feature
                "chart_only": false                    // Show full toolbar with camera
            });
            
            // After chart loads, inject replay button
            tvWidget.onChartReady(() => {
                console.log("Chart ready, injecting replay button...");
                // Start injection process
                setTimeout(() => {
                    waitAndInject();
                }, 1000);
                
                // Also try after a few more seconds
                setTimeout(() => {
                    if (!replayButtonInjected) {
                        waitAndInject();
                    }
                }, 3000);
                
                setTimeout(() => {
                    if (!replayButtonInjected) {
                        waitAndInject();
                    }
                }, 5000);
            });
        }
        
        // Switch between XAUUSD and BTCUSD
        window.switchPair = function(pair) {
            if (currentPair === pair) return;
            currentPair = pair;
            
            // Update buttons
            document.getElementById('btn-xau').classList.remove('active');
            document.getElementById('btn-btc').classList.remove('active');
            document.getElementById(pair === 'XAUUSD' ? 'btn-xau' : 'btn-btc').classList.add('active');
            
            // Stop replay mode
            stopReplayAndCleanup();
            
            // Reinit chart with new symbol
            initTradingViewWidget(pair);
        };
        
        // Initialize on page load
        window.onload = function() {
            initTradingViewWidget('XAUUSD');
        };
        
        // Handle window resize
        window.addEventListener('resize', function() {
            if (tvWidget && tvWidget.resize) {
                try {
                    tvWidget.resize();
                } catch(e) {}
            }
        });
        
        // Clean up before page unload
        window.addEventListener('beforeunload', function() {
            if (replayInterval) {
                clearInterval(replayInterval);
            }
            if (tvWidget && typeof tvWidget.remove === 'function') {
                try {
                    tvWidget.remove();
                } catch(e) {}
            }
        });
        
        // Export for debugging
        window.getReplayStatus = () => ({ active: replayActive, injected: replayButtonInjected });
    </script>
</body>
    </html>
