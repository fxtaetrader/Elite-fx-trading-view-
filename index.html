<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TradingView · Fullscreen</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0b1017; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Simple minimal header */
        .header {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f1a24;
            border-bottom: 1px solid #2a3f54;
        }
        
        .logo { 
            font-size: 1.2rem; 
            font-weight: 600; 
            color: #ffb347;
        }
        
        .pair-selector {
            display: flex;
            gap: 10px;
        }
        
        .pair-btn {
            background: #16222e;
            border: 1px solid #3a5670;
            border-radius: 30px;
            padding: 6px 16px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .pair-btn.active {
            background: #1f364d;
            border-color: #ffb347;
            color: #ffd966;
        }
        
        /* Fullscreen chart container */
        .chart-container {
            flex: 1;
            width: 100%;
            background: #0f1a24;
            overflow: hidden;
            position: relative;
        }
        
        #tv_chart {
            width: 100%;
            height: 100%;
        }
        
        /* Custom replay button overlay - positioned near indicator area (top right corner of chart) */
        .replay-control {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 100;
            background: rgba(21, 34, 46, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 8px;
            border: 1px solid #3a5670;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .replay-control:hover {
            background: #1f364d;
            border-color: #ffb347;
            transform: scale(1.02);
        }
        
        .replay-icon {
            font-size: 18px;
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.3));
        }
        
        .replay-text {
            font-size: 13px;
            font-weight: 500;
            color: #e6e9f0;
            letter-spacing: 0.3px;
        }
        
        .replay-control.active {
            background: #2a4a6e;
            border-color: #ffb347;
            box-shadow: 0 0 6px rgba(255,180,71,0.3);
        }
        
        .replay-control.active .replay-text {
            color: #ffd966;
        }
        
        /* Simple replay status indicator (small dot when active) */
        .replay-badge {
            width: 8px;
            height: 8px;
            background-color: #ffb347;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        
        /* Tooltip style for better UX */
        .replay-control::after {
            content: "Replay mode - step through historical bars";
            position: absolute;
            bottom: -32px;
            right: 0;
            background: #1e2a36;
            color: #ffd966;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            border: 1px solid #3a5670;
            font-weight: normal;
            z-index: 101;
        }
        
        .replay-control:hover::after {
            opacity: 1;
        }
        
        /* Responsive adjustments */
        @media (max-width: 640px) {
            .replay-control {
                top: 8px;
                right: 8px;
                padding: 4px 10px;
            }
            .replay-text {
                font-size: 11px;
            }
            .replay-icon {
                font-size: 14px;
            }
            .replay-control::after {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Minimal header -->
    <div class="header">
        <div class="logo">📊 TV CHARTS</div>
        <div class="pair-selector">
            <div class="pair-btn active" id="btn-xau" onclick="switchPair('XAUUSD')">XAUUSD</div>
            <div class="pair-btn" id="btn-btc" onclick="switchPair('BTCUSD')">BTCUSD</div>
        </div>
    </div>
    
    <!-- Fullscreen TradingView Chart -->
    <div class="chart-container">
        <div id="tv_chart"></div>
        
        <!-- Custom Replay Mode Icon (positioned near indicator area / top right) -->
        <div id="replayButton" class="replay-control" onclick="toggleReplayMode()">
            <span class="replay-icon">⏪</span>
            <span class="replay-text" id="replayText">Replay</span>
            <span id="replayActiveDot" style="display: none;" class="replay-badge"></span>
        </div>
    </div>

    <!-- TradingView Widget Script -->
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let currentPair = 'XAUUSD';
        let tvWidget = null;
        let replayActive = false;
        let replayInterval = null;
        let replayBarIndex = 0;
        let originalBarsData = []; // store bars for replay simulation
        let replaySymbol = null;
        let isReplaySimulating = false;
        
        // Helper to get the chart instance from widget (internal)
        function getChart() {
            if (tvWidget && tvWidget._api) {
                return tvWidget._api;
            }
            return null;
        }
        
        // Custom replay mode using TradingView's chart methods (bar replay simulation)
        // This creates a replay effect by moving the time scale step by step using the chart's built-in methods.
        // We'll use requestAnimationFrame or setInterval to move forward one bar at a time,
        // and provide a smooth replay experience near the indicator area.
        
        function startReplayMode() {
            if (replayActive) return;
            
            try {
                const chart = getChart();
                if (!chart) {
                    console.warn("Chart API not ready yet, retrying...");
                    setTimeout(startReplayMode, 500);
                    return;
                }
                
                // Reset replay state
                replayActive = true;
                isReplaySimulating = true;
                
                // Update UI
                const replayBtn = document.getElementById('replayButton');
                const replayTextSpan = document.getElementById('replayText');
                const activeDot = document.getElementById('replayActiveDot');
                
                if (replayBtn) replayBtn.classList.add('active');
                if (replayTextSpan) replayTextSpan.innerHTML = 'Replay ▶';
                if (activeDot) activeDot.style.display = 'inline-block';
                
                // First, save current visible range, then go to earliest visible bar and start stepping
                // TradingView widget provides methods: getVisibleRange(), setVisibleRange(), 
                // and we can use chart.executeActionById("timeScaleStepLeft") or custom stepping.
                // For elegant replay, we get the first timestamp from series and step forward bar by bar.
                
                // Get the main series to know bar interval
                chart.getSeries().then(series => {
                    if (series && series.getBars) {
                        // Fetch recent bars (max 500) to get timestamps for stepping
                        // Alternatively, we can use the built-in timeScale to step left/right.
                        // Simpler but effective: use setInterval to press "step right" action.
                        // TradingView has "timeScaleStepRight" action id.
                        // We'll move one bar forward every 1.2 seconds for classic replay feel.
                        
                        // First, move to the earliest visible bar (optional: scroll to beginning)
                        // We can execute "timeScaleStepLeft" multiple times, but easier: set time to start
                        // Let's get the first timestamp from the loaded data range.
                        // For robust replay, we use the chart's timeScale to get min & max, then start from min.
                        const timeScale = chart.timeScale();
                        const visibleRange = timeScale.getVisibleRange();
                        
                        // Get the logical range (bar indexes)
                        const logicalRange = timeScale.getVisibleLogicalRange();
                        if (logicalRange) {
                            // Start replay from the leftmost bar index
                            replayBarIndex = logicalRange.from;
                            const totalBars = logicalRange.to - logicalRange.from;
                            
                            // Clear any existing interval
                            if (replayInterval) clearInterval(replayInterval);
                            
                            // Function to step to next bar
                            const stepNextBar = () => {
                                if (!replayActive) return;
                                
                                const currentLogical = timeScale.getVisibleLogicalRange();
                                if (currentLogical) {
                                    let nextFrom = currentLogical.from + 1;
                                    let nextTo = currentLogical.to + 1;
                                    
                                    // If we reached the end, stop replay gracefully
                                    if (nextTo > currentLogical.to + 5 || nextFrom > replayBarIndex + totalBars + 5) {
                                        stopReplayMode();
                                        return;
                                    }
                                    
                                    // Set new logical range (shift one bar forward)
                                    timeScale.setVisibleLogicalRange({ from: nextFrom, to: nextTo });
                                }
                            };
                            
                            // Start stepping every 1.2 seconds (classic replay speed)
                            replayInterval = setInterval(stepNextBar, 1200);
                            
                            // Also add a small delay then first step
                            setTimeout(() => {
                                if (replayActive) stepNextBar();
                            }, 300);
                        }
                    } else {
                        // Fallback: use key shortcuts simulation via action IDs
                        if (replayInterval) clearInterval(replayInterval);
                        replayInterval = setInterval(() => {
                            if (!replayActive) return;
                            try {
                                chart.executeActionById("timeScaleStepRight");
                            } catch(e) {}
                        }, 1200);
                    }
                }).catch(err => {
                    console.warn("Series access fallback, using action replay");
                    if (replayInterval) clearInterval(replayInterval);
                    replayInterval = setInterval(() => {
                        if (!replayActive) return;
                        try {
                            const fallbackChart = getChart();
                            if (fallbackChart) fallbackChart.executeActionById("timeScaleStepRight");
                        } catch(e) {}
                    }, 1200);
                });
                
            } catch (error) {
                console.error("Error starting replay mode:", error);
                replayActive = false;
                isReplaySimulating = false;
                updateReplayUI(false);
            }
        }
        
        function stopReplayMode() {
            if (replayInterval) {
                clearInterval(replayInterval);
                replayInterval = null;
            }
            replayActive = false;
            isReplaySimulating = false;
            updateReplayUI(false);
            
            // Optionally restore normal view? We'll keep chart as is after stopping, user can zoom out.
            // But we also reset any active dot and button style.
        }
        
        function updateReplayUI(active) {
            const replayBtn = document.getElementById('replayButton');
            const replayTextSpan = document.getElementById('replayText');
            const activeDot = document.getElementById('replayActiveDot');
            
            if (active) {
                if (replayBtn) replayBtn.classList.add('active');
                if (replayTextSpan) replayTextSpan.innerHTML = 'Replay ▶';
                if (activeDot) activeDot.style.display = 'inline-block';
            } else {
                if (replayBtn) replayBtn.classList.remove('active');
                if (replayTextSpan) replayTextSpan.innerHTML = 'Replay';
                if (activeDot) activeDot.style.display = 'none';
            }
        }
        
        // Toggle replay mode - with safety to not conflict with widget internals
        window.toggleReplayMode = function() {
            if (replayActive) {
                stopReplayMode();
            } else {
                // Before starting new replay, make sure any previous interval is cleared
                if (replayInterval) {
                    clearInterval(replayInterval);
                    replayInterval = null;
                }
                startReplayMode();
            }
        };
        
        // When switching pairs, we must stop replay mode to avoid errors on new widget
        function stopReplayAndCleanup() {
            if (replayInterval) {
                clearInterval(replayInterval);
                replayInterval = null;
            }
            replayActive = false;
            isReplaySimulating = false;
            updateReplayUI(false);
        }
        
        // Enhanced initialization with replay integration
        function initTradingViewWidget(symbol) {
            // Stop any active replay before reinitializing
            stopReplayAndCleanup();
            
            const container = document.getElementById('tv_chart');
            
            // Map symbols to TradingView format
            const tvSymbol = symbol === 'XAUUSD' ? 'FX_IDC:XAUUSD' : 'COINBASE:BTCUSD';
            
            // Destroy existing widget if any to prevent memory leaks
            if (tvWidget && typeof tvWidget.remove === 'function') {
                try {
                    tvWidget.remove();
                } catch(e) {}
                tvWidget = null;
            }
            
            // Clear container inner HTML to ensure fresh mount (TradingView will fill it)
            const chartDiv = document.getElementById('tv_chart');
            if (chartDiv) {
                // Keep div clean but TradingView script will populate
            }
            
            // Create TradingView widget with full height
            tvWidget = new TradingView.widget({
                "width": "100%",
                "height": "100%",
                "symbol": tvSymbol,
                "interval": "15",
                "timezone": "exchange",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#0f1a24",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "container_id": "tv_chart",
                "studies": [
                    "MASimple@tv-basicstudies"
                ],
                "disabled_features": ["use_localstorage_for_settings"],
                "enabled_features": ["show_hide_button_on_legend"],
                "loading_screen": { "backgroundColor": "#0f1a24" }
            });
            
            // After widget creation, ensure replay button is reset
            tvWidget.onChartReady(() => {
                // Optional: customize anything after chart loads
                // Reset replay UI state
                updateReplayUI(false);
                
                // Also add a small helper to ensure replay mode doesn't conflict with study panels
                // The replay button stays near indicator area (top right) as overlay
            });
        }
        
        // Switch between XAUUSD and BTCUSD with replay cleanup
        window.switchPair = function(pair) {
            if (currentPair === pair) return;
            currentPair = pair;
            
            // Update buttons
            document.getElementById('btn-xau').classList.remove('active');
            document.getElementById('btn-btc').classList.remove('active');
            document.getElementById(pair === 'XAUUSD' ? 'btn-xau' : 'btn-btc').classList.add('active');
            
            // Stop replay mode gracefully
            stopReplayAndCleanup();
            
            // Reinit chart with new symbol
            initTradingViewWidget(pair);
        };
        
        // Initialize
        window.onload = function() {
            initTradingViewWidget('XAUUSD');
            
            // Add some extra polish: ensure replay button tooltip doesn't cause layout issues
            const replayBtnElem = document.getElementById('replayButton');
            if (replayBtnElem) {
                replayBtnElem.setAttribute('title', 'Bar replay mode: step through historical bars automatically');
            }
        };
        
        // Handle window resize - also handle replay safety
        window.addEventListener('resize', function() {
            if (tvWidget && tvWidget.resize) {
                try {
                    tvWidget.resize();
                } catch(e) {}
            }
            // If replay active, keep intervals intact but no extra action needed
        });
        
        // Clean up before page unload
        window.addEventListener('beforeunload', function() {
            if (replayInterval) {
                clearInterval(replayInterval);
            }
            if (tvWidget && typeof tvWidget.remove === 'function') {
                try {
                    tvWidget.remove();
                } catch(e) {}
            }
        });
        
        // Additional safeguard: if user clicks on any study or indicator, replay mode shouldn't break.
        // The custom button remains independent.
    </script>
</body>
    </html>
